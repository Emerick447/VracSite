<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Papayou - Choix de la version</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

button{
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>🎴 Papayou</h2>

<p>Version :</p>

<input
    id="version"
    type="number"
    min="1"
    placeholder="Ex : 3">

<button onclick="ouvrir()">
Ouvrir
</button>

</div>

<script>

function ouvrir(){

    let v=document.getElementById("version").value.trim();

    if(v===""){
        alert("Choisissez une version.");
        return;
    }

    window.location.href="papayou/papayou_v"+v+".html";

}

</script>

</body>
</html>
