<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lecteur ePub</title>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:#333;
    padding:10px;
    display:flex;
    gap:10px;
    align-items:center;
}

button{
    padding:8px 20px;
    font-size:16px;
}

#viewer{
    flex:1;
    background:white;
}

input{
    color:white;
}
</style>
</head>
<body>

<header>
<input type="file" id="file" accept=".epub">

<button id="prev">◀ Précédent</button>
<button id="next">Suivant ▶</button>
</header>

<div id="viewer"></div>

<script>

let book;
let rendition;

document.getElementById("file").addEventListener("change", function(e){

    const fichier = e.target.files[0];

    if(!fichier) return;

    const url = URL.createObjectURL(fichier);

    book = ePub(url);

    rendition = book.renderTo("viewer",{
        width:"100%",
        height:"100%"
    });

    rendition.display();

});

document.getElementById("next").onclick = function(){
    if(rendition) rendition.next();
}

document.getElementById("prev").onclick = function(){
    if(rendition) rendition.prev();
}

document.addEventListener("keydown",function(e){

    if(!rendition) return;

    if(e.key==="ArrowRight")
        rendition.next();

    if(e.key==="ArrowLeft")
        rendition.prev();

});

</script>

</body>
</html>
